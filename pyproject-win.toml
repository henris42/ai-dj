[project]
name = "ai-dj-gui"
version = "0.0.1"
description = "AI DJ — Windows-native GUI + player (connects to WSL-side Qdrant)"
requires-python = ">=3.10,<3.13"
dependencies = [
    "numpy",
    "qdrant-client>=1.17,<2",
    # umap-learn lives only on the WSL side — Windows reads the cached
    # projection.npz produced by fit() in WSL. Avoids pulling numba/llvmlite.
    "PySide6>=6.7",
    "pyqtgraph>=0.13",
    "PyOpenGL",
    "python-mpv>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_dj"]

[tool.hatch.build.targets.wheel.force-include]
# The heavy embed modules (scan/embed/index-build) stay importable in WSL only.
# Windows GUI never imports them.
